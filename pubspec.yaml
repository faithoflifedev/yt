name: yt
version: 2.2.6+1
description: Native Dart interface to multiple YouTube REST APIs including the Data and Live Streaming API.
repository: https://github.com/faithoflifedev/yt
homepage: https://github.com/faithoflifedev/yt

topics:
  - api

environment:
  sdk: ^3.8.0

dependencies:
  args: ^2.7.0
  csv: ^6.0.0
  dio: ^5.9.0
  fling_pickle: ^0.4.3
  googleapis_auth: ^2.0.0
  http: ^1.5.0
  http_parser: ^4.1.2
  json_annotation: ^4.9.0
  loggy: ^2.0.3
  retrofit: ^4.7.2
  stemmer: ^2.2.0
  universal_io: ^2.2.2
  yaml: ^3.1.3

dev_dependencies:
  build_runner: ^2.7.1
  grinder: ^0.9.5
  json_serializable: ^6.9.5
  lints: ^6.0.0
  pub_semver: ^2.2.0
  publish_tools: ^1.0.0+11
  retrofit_generator: ^10.0.4

executables:
  yt:
