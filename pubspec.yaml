name: yt
version: 2.2.5+7
description: Native Dart interface to multiple YouTube REST APIs including the Data API.
repository: https://github.com/faithoflifedev/yt
homepage: https://github.com/faithoflifedev/yt

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  args: ^2.6.0
  csv: ^6.0.0
  dio: ^5.4.3+1
  fling_pickle: ^0.4.3
  googleapis_auth: ^2.0.0
  http: ^1.2.1
  http_parser: ^4.0.2
  json_annotation: ^4.9.0
  loggy: ^2.0.3
  retrofit: ^4.1.0
  stemmer: ^2.2.0
  universal_io: ^2.2.2
  yaml: ^3.1.2

dev_dependencies:
  build_runner: ^2.5.4
  grinder: ^0.9.5
  json_serializable: ^6.9.5
  lints: ^6.0.0
  pub_semver: ^2.1.4
  publish_tools: ^1.0.0+10
  retrofit_generator: ^9.2.0

executables:
  yt:
