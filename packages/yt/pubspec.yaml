name: yt
version: 2.2.6+2
description: Native Dart interface to multiple YouTube REST APIs including the Data and Live Streaming API.
repository: https://github.com/faithoflifedev/yt
homepage: https://github.com/faithoflifedev/yt

topics:
  - api

environment:
  sdk: ^3.10.0

resolution: workspace

dependencies:
  args: ^2.7.0
  csv: ^7.2.0
  dio: ^5.9.2
  fling_pickle: ^0.4.3
  googleapis_auth: ^2.2.0
  http: ^1.6.0
  http_parser: ^4.1.2
  json_annotation: ^4.11.0
  loggy: ^2.0.3
  retrofit: ^4.9.2
  stemmer: ^3.2.0
  universal_io: ^2.3.1
  yaml: ^3.1.3

dev_dependencies:
  build_runner: ^2.12.2
  grinder: ^0.9.5
  json_serializable: ^6.13.0
  lints: ^6.1.0
  pub_semver: ^2.2.0
  publish_tools: ^1.0.0+11
  retrofit_generator: ^10.2.3
